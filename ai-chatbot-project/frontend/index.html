<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      height: 600px;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 12px 12px 0 0;
      text-align: center;
    }

    .header h1 {
      font-size: 24px;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .chat-display {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
    }

    .message {
      margin-bottom: 15px;
      display: flex;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-content {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .user .message-content {
      background: #667eea;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .assistant .message-content {
      background: #e9ecef;
      color: #333;
      border-bottom-left-radius: 4px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #999;
      text-align: center;
    }

    .empty-state p {
      font-size: 14px;
    }

    .input-area {
      padding: 20px;
      background: white;
      display: flex;
      gap: 10px;
    }

    .input-area input {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus {
      border-color: #667eea;
    }

    .input-area button {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 24px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .input-area button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .input-area button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .reset-btn {
      padding: 8px 12px;
      background: #f0f0f0;
      color: #666;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    .reset-btn:hover {
      background: #e0e0e0;
    }

    .status {
      padding: 10px 20px;
      font-size: 12px;
      color: #999;
      text-align: center;
      border-top: 1px solid #eee;
    }

    .status.loading {
      color: #667eea;
      font-weight: 600;
    }

    .status.error {
      color: #e74c3c;
    }

    .typing {
      display: inline-block;
      margin-left: 5px;
    }

    .typing span {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #667eea;
      animation: typing 1.4s infinite;
    }

    .typing span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .typing span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes typing {
      0%, 60%, 100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      30% {
        opacity: 1;
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🤖 AI Chatbot</h1>
      <p>Powered by OpenRouter (GPT-4o Mini)</p>
    </div>

    <div class="chat-display" id="chatDisplay">
      <div class="empty-state">
        <p>👋 Start a conversation</p>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="messageInput"
        placeholder="Type your message..."
        autocomplete="off"
      />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
      <button class="reset-btn" onclick="resetChat()">Reset</button>
    </div>

    <div class="status" id="status"></div>
  </div>

  <script>
    // Configuration
    const BACKEND_URL = process.env.REACT_APP_BACKEND_URL || 'http://localhost:3000';
    const PRODUCTION_BACKEND_URL = 'https://your-backend-url.com'; // Update with deployed URL

    // Use production URL if not localhost
    const API_BASE_URL = window.location.hostname === 'localhost' 
      ? BACKEND_URL 
      : PRODUCTION_BACKEND_URL;

    // State
    let messages = [];
    let isLoading = false;

    const chatDisplay = document.getElementById('chatDisplay');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const statusDiv = document.getElementById('status');

    /**
     * Send message to backend
     */
    async function sendMessage() {
      const text = messageInput.value.trim();

      if (!text) return;
      if (isLoading) return;

      // Add user message to UI
      messages.push({ role: 'user', content: text });
      displayMessage(text, 'user');

      messageInput.value = '';
      isLoading = true;
      updateStatus('loading', 'AI is thinking...');
      sendBtn.disabled = true;

      try {
        // Call backend API (NOT OpenRouter directly)
        const response = await fetch(`${API_BASE_URL}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages }),
        });

        if (!response.ok) {
          const errorData = await response.json();
          throw new Error(errorData.error || 'Failed to get response');
        }

        const data = await response.json();
        const aiReply = data.reply;

        // Add assistant message
        messages.push({ role: 'assistant', content: aiReply });
        displayMessage(aiReply, 'assistant');

        updateStatus('success', `${messages.length} messages in conversation`);
      } catch (error) {
        console.error('Error:', error);
        updateStatus('error', `Error: ${error.message}`);
        displayMessage(`❌ ${error.message}`, 'assistant');
      } finally {
        isLoading = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }
    }

    /**
     * Display message in chat
     */
    function displayMessage(text, role) {
      // Remove empty state
      if (chatDisplay.querySelector('.empty-state')) {
        chatDisplay.innerHTML = '';
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${role}`;

      const content = document.createElement('div');
      content.className = 'message-content';
      content.textContent = text;

      messageDiv.appendChild(content);
      chatDisplay.appendChild(messageDiv);
      chatDisplay.scrollTop = chatDisplay.scrollHeight;
    }

    /**
     * Update status bar
     */
    function updateStatus(type, message) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }

    /**
     * Reset conversation
     */
    async function resetChat() {
      if (!confirm('Reset conversation?')) return;

      try {
        await fetch(`${API_BASE_URL}/reset`, { method: 'POST' });
        messages = [];
        chatDisplay.innerHTML = '<div class="empty-state"><p>👋 Start a conversation</p></div>';
        messageInput.value = '';
        updateStatus('', '');
      } catch (error) {
        console.error('Reset error:', error);
      }
    }

    /**
     * Handle Enter key
     */
    messageInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Focus input on load
    messageInput.focus();

    // Check backend health on load
    (async () => {
      try {
        const response = await fetch(`${API_BASE_URL}/health`);
        if (response.ok) {
          updateStatus('', 'Connected');
        }
      } catch (error) {
        updateStatus('error', '⚠️ Backend not reachable');
      }
    })();
  </script>
</body>
</html>
