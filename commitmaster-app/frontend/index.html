<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CommitMaster - Generate Git Commit Messages</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
    }

    .header {
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 28px;
      color: #333;
      margin-bottom: 8px;
    }

    .header p {
      color: #666;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.5;
      resize: vertical;
      min-height: 200px;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .output-section {
      margin-top: 30px;
    }

    .output-title {
      font-size: 16px;
      font-weight: 600;
      color: #333;
      margin-bottom: 15px;
    }

    .commit-option {
      background: #f9f9f9;
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .commit-option:hover {
      background: #f5f5f5;
      border-color: #667eea;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
    }

    .commit-badge {
      display: inline-block;
      background: #667eea;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .commit-message {
      font-family: 'Courier New', monospace;
      font-size: 13px;
      color: #333;
      background: white;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 10px;
      word-break: break-all;
      border-left: 3px solid #667eea;
    }

    .commit-actions {
      display: flex;
      gap: 10px;
    }

    .copy-btn {
      flex: 1;
      padding: 8px;
      background: white;
      color: #667eea;
      border: 1px solid #667eea;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #667eea;
      color: white;
    }

    .copy-btn.copied {
      background: #4caf50;
      color: white;
      border-color: #4caf50;
    }

    .status {
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 15px;
      text-align: center;
    }

    .status.loading {
      background: #e3f2fd;
      color: #1976d2;
    }

    .status.error {
      background: #ffebee;
      color: #d32f2f;
    }

    .status.success {
      background: #e8f5e9;
      color: #388e3c;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 40px 20px;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top-color: currentColor;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .example {
      background: #f5f5f5;
      border-left: 3px solid #667eea;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      color: #666;
      margin-top: 15px;
      line-height: 1.6;
    }

    .example strong {
      color: #333;
    }

    .char-count {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Input Panel -->
    <div class="panel">
      <div class="header">
        <h1>📝 CommitMaster</h1>
        <p>AI-powered Git commit message generator</p>
      </div>

      <div class="form-group">
        <label for="codeInput">Paste your code changes or diff:</label>
        <textarea
          id="codeInput"
          placeholder="Paste git diff, code changes, or describe what you modified..."
        ></textarea>
        <div class="char-count"><span id="charCount">0</span> characters</div>
      </div>

      <button id="generateBtn" onclick="generateCommits()">
        Generate Commit Messages
      </button>

      <div class="example">
        <strong>Example input:</strong><br>
        Changed password validation from 8 chars to 12 chars. Added uppercase requirement. Updated tests accordingly.
      </div>
    </div>

    <!-- Output Panel -->
    <div class="panel">
      <div class="header">
        <h1>✨ Suggestions</h1>
        <p>Choose and copy your commit message</p>
      </div>

      <div id="outputArea">
        <div class="empty-state">
          👇 Paste code changes and generate suggestions
        </div>
      </div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'http://localhost:3000';
    const PRODUCTION_URL = 'https://commitmaster-backend.onrender.com';
    const API_BASE = window.location.hostname === 'localhost' ? BACKEND_URL : PRODUCTION_URL;

    const codeInput = document.getElementById('codeInput');
    const generateBtn = document.getElementById('generateBtn');
    const outputArea = document.getElementById('outputArea');
    const charCount = document.getElementById('charCount');

    // Update character count
    codeInput.addEventListener('input', () => {
      charCount.textContent = codeInput.value.length;
    });

    async function generateCommits() {
      const code = codeInput.value.trim();

      if (!code) {
        showStatus('Please paste some code changes first', 'error');
        return;
      }

      generateBtn.disabled = true;
      showStatus('<div class="spinner"></div> Analyzing your code...', 'loading');

      try {
        const response = await fetch(`${API_BASE}/generate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ codeChanges: code }),
        });

        if (!response.ok) {
          const error = await response.json();
          throw new Error(error.error || 'Failed to generate commits');
        }

        const data = await response.json();
        displayCommits(data.commits);
        showStatus('✅ Generated 3 commit suggestions', 'success');
      } catch (error) {
        console.error('Error:', error);
        showStatus(`❌ ${error.message}`, 'error');
      } finally {
        generateBtn.disabled = false;
      }
    }

    function displayCommits(commits) {
      if (!commits || commits.length === 0) {
        outputArea.innerHTML = '<div class="empty-state">No commits generated</div>';
        return;
      }

      outputArea.innerHTML = commits
        .map((commit, index) => `
          <div class="commit-option">
            <div class="commit-badge">${commit.type.toUpperCase()}${commit.scope ? `(${commit.scope})` : ''}</div>
            <div class="commit-message">${commit.full}</div>
            <div class="commit-actions">
              <button class="copy-btn" onclick="copyCommit('${escapeQuotes(commit.full)}', this)">
                Copy
              </button>
            </div>
          </div>
        `)
        .join('');
    }

    function copyCommit(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    function escapeQuotes(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
    }

    function showStatus(message, type) {
      const status = document.createElement('div');
      status.className = `status ${type}`;
      status.innerHTML = message;

      const existing = document.querySelector('.status');
      if (existing) existing.remove();

      if (outputArea.children.length === 0 || outputArea.querySelector('.empty-state')) {
        outputArea.prepend(status);
      } else {
        outputArea.parentElement.insertBefore(status, outputArea);
      }
    }

    // Check backend health on load
    (async () => {
      try {
        await fetch(`${API_BASE}/health`);
      } catch {
        showStatus('⚠️ Backend not reachable', 'error');
      }
    })();
  </script>
</body>
</html>
