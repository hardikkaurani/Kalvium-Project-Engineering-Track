<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker - Track Your Daily Spending</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>💰 Expense Tracker</h1>
      <p>Track your daily spending and understand where your money goes</p>
    </div>

    <div class="card">
      <h2>Add New Expense</h2>
      <div id="status"></div>
      <form id="expenseForm">
        <div class="form-row">
          <div class="form-group">
            <label for="title">Description</label>
            <input type="text" id="title" placeholder="e.g., Coffee" required />
          </div>
          <div class="form-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="50.00" step="0.01" required />
          </div>
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option value="">Select category</option>
              <option value="Food">🍕 Food</option>
              <option value="Transport">🚗 Transport</option>
              <option value="Entertainment">🎬 Entertainment</option>
              <option value="Health">🏥 Health</option>
              <option value="Shopping">🛍️ Shopping</option>
              <option value="Utilities">⚡ Utilities</option>
              <option value="Other">📌 Other</option>
            </select>
          </div>
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required />
          </div>
        </div>
        <button type="submit" id="submitBtn">Add Expense</button>
      </form>
    </div>

    <div class="card">
      <h2>Your Expenses</h2>
      <div class="summary"></div>
      <div id="expenseList" class="expense-list">
        <div class="empty-state">
          <p>📊 Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
