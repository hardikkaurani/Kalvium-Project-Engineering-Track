<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - Simple & Clean</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <h1>📝 Task Manager</h1>
            <p class="subtitle">Keep track of your daily tasks</p>
        </header>

        <!-- Input Section -->
        <section class="input-section">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="taskInput" 
                    class="task-input" 
                    placeholder="Add a new task..."
                    aria-label="Task input"
                >
                <button id="addBtn" class="add-btn">Add Task</button>
            </div>
        </section>

        <!-- Filter Buttons -->
        <section class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </section>

        <!-- Task List -->
        <section class="task-section">
            <ul id="taskList" class="task-list">
                <!-- Tasks will be rendered here by JavaScript -->
            </ul>
            
            <!-- Empty State Message -->
            <div id="emptyState" class="empty-state">
                <p>No tasks yet. Add one to get started! 🚀</p>
            </div>
        </section>

        <!-- Stats Footer -->
        <footer class="footer">
            <span id="taskStats" class="task-stats">0 Active • 0 Completed</span>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
